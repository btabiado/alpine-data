name: lthcs-trends-weekly

# Weekly Google Trends batch for the LTHCS Adoption pillar. pytrends is
# keyless but heavily rate-limited; running on Monday 04:00 UTC
# (= Sunday 23:00 ET) gives Google's limiter overnight to cool down
# after weekday traffic and avoids fighting the daily 23:00 UTC cron.
#
# Writes weekly snapshots to data/lthcs/trends/<ISO-week>.json and
# commits them back to main so the next daily/pages build picks them up.
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

# Distinct concurrency group from lthcs-daily so a Monday cron collision
# doesn't kill either run; cancel-in-progress: false lets a manual
# dispatch queue behind the scheduled run instead of stomping it.
concurrency:
  group: lthcs-trends-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly Google Trends batch
        # pytrends is keyless. The script handles its own retries +
        # backoff; if Google still blocks us, exit non-zero so the run
        # is visible in the Actions UI rather than silently no-op'ing.
        run: python scripts/lthcs_trends_weekly.py

      - name: Commit data changes via signed API commit
        # Switched from plain `git push` to API-based commit so the
        # resulting commit is auto-signed by GitHub (Verified badge).
        # See .github/scripts/api-commit.sh for race-safety details.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR_NAME: lthcs-bot
          AUTHOR_EMAIL: lthcs-bot@users.noreply.github.com
        run: |
          git add data/lthcs/trends/
          .github/scripts/api-commit.sh \
            "lthcs: weekly trends $(date -u +%Y-%m-%d) [skip ci]"
