name: lthcs-trends-daily

# Daily Google Trends nudge for the LTHCS Adoption pillar — Phase 2 of
# Tier 2 #14. The weekly batch (lthcs-trends-weekly.yml) only reaches
# ~11/167 tickers before pytrends 429s us; this daily cron spreads work
# across the week (~30 tickers/day) so the full universe refreshes
# every 5-6 days.
#
# Runs at 04:00 UTC — same hour as the weekly Monday batch, but daily.
# pytrends has no API key; the script's AdaptiveSleeper handles backoff
# (12s base, 2x on 429 capped at 300s, reset on success) and a
# 5-consecutive-429 circuit breaker ships partial progress for tomorrow.
#
# Writes additively to data/lthcs/trends/<ISO-week>.json (preserves
# Phase 1's weekly fetches) and commits back to main so the next
# pages.yml deploy picks the new data up.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Override default batch size (default: 30 tickers/day)"
        required: false
        default: "30"
      force:
        description: "Ignore the 5-day stale-cache TTL"
        required: false
        default: "false"

permissions:
  contents: write

# Distinct concurrency group from lthcs-daily AND lthcs-trends-weekly
# so a Monday morning triple-cron (daily + weekly + manual) doesn't
# trip over itself. cancel-in-progress: false lets the manual dispatch
# queue behind the scheduled run instead of stomping it.
concurrency:
  group: lthcs-trends-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily Google Trends nudge
        # The script handles its own backoff + retry + resume from
        # .cache/lthcs/trends_progress.json. Exit non-zero on hard fail
        # so the run is visible in the Actions UI; soft-bail on
        # consecutive 429s exits 0 (ship-what-we-have).
        run: |
          python scripts/lthcs_trends_daily.py \
            --batch-size "${{ github.event.inputs.batch_size || '30' }}" \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Commit and push if data changed
        run: |
          git config user.name "lthcs-bot"
          git config user.email "lthcs-bot@users.noreply.github.com"
          git add data/lthcs/trends/
          if git diff --staged --quiet; then
            echo "No trends data changes; skipping commit."
          else
            git commit -m "lthcs: daily trends nudge $(date -u +%Y-%m-%d) [skip ci]"
            # Race-safe push: mirror lthcs-daily.yml's retry loop so
            # main moving under us (daily cron, manual dev push) doesn't
            # eat tonight's batch.
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                echo "Push succeeded on attempt $attempt."
                exit 0
              fi
              echo "Push attempt $attempt rejected — fetching + rebasing..."
              git fetch origin main
              git rebase --autostash origin/main || {
                echo "Rebase conflict on attempt $attempt; aborting."
                git rebase --abort
                exit 1
              }
            done
            echo "All 3 push attempts failed; giving up." && exit 1
          fi
