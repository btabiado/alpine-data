name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Smoke-test the static HTML generator
        run: |
          # Aggregator should produce a working dashboard.html from a
          # minimal one-row CSV (proves the full read -> aggregate -> render
          # pipeline works end-to-end in CI).
          mkdir -p data
          printf 'date,Total\n2024-01-11,100\n' > data/btc_flows.csv
          printf 'date,Total\n2024-07-23,50\n' > data/eth_flows.csv
          python app.py --no-open
          test -f dashboard.html
          echo "dashboard.html generated ($(wc -c < dashboard.html) bytes)"
