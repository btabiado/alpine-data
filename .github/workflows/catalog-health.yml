name: catalog-health

# Monthly link-health re-check for the Data Sources Catalog (/health/#catalog).
#
# scripts/check_catalog_links.py HTTP-checks every unique URL in
# health/api_catalog.json and writes health/catalog_health.json (+ .md),
# classifying each link ok / gated / dead / unreachable. The /health/ page
# fetches catalog_health.json at runtime to show the freshness summary, so
# without this job that file goes stale (it had no regenerating workflow
# before — only manual runs).
#
# build_catalog_xlsx.py then rebuilds the downloadable workbook
# (health/api-catalog.xlsx) so its Freshness/Health column stays in sync with
# the JSON. The original landscape PDF (health/api-catalog.pdf) is NOT touched.
#
# Runs at 08:00 UTC every Monday (weekly) — offset from the daily data
# bots (real-estate 06:00, city 07:00) so they don't race the same commit.
# Weekly cadence (was monthly `0 8 1 * *`, 2026-07-13): keeps catalog_health.json
# fresh for the ADW discovery agent, which grounds its metric hunt on the
# status=OK (reachable, free/keyless) sources. API availability rarely changes
# day-to-day, so weekly captures ~all the signal without hammering 2,192 endpoints.
# The probe uses a desktop-browser User-Agent; on CI's clean network +
# modern TLS that recovers most of the bot-walled false-positives a
# self-identifying UA used to collect. [skip ci] keeps the push from
# retriggering pages.yml — its hourly cron deploys the refreshed files.
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

# Solo concurrency group — keep manual dispatch from overlapping a scheduled run.
concurrency:
  group: catalog-health-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install deps
        # requests = the link checker's only third-party import;
        # openpyxl = the xlsx builder's. Everything else is stdlib.
        run: pip install requests openpyxl

      - name: Re-check catalog links
        # Writes health/catalog_health.json + health/catalog_health.md.
        # Exit 0 even with dead links (flagging is the job, not failing CI).
        run: python scripts/check_catalog_links.py

      - name: Rebuild catalog spreadsheet
        # Regenerates health/api-catalog.xlsx from the fresh health data.
        run: python scripts/build_catalog_xlsx.py

      - name: Commit refreshed catalog health via signed API commit
        # Mirrors city-daily/real-estate-daily: API-based commit so the bot
        # commit is GitHub-signed (Verified). api-commit.sh reads the staged
        # index, so all three files round-trip in one commit; it no-ops if
        # nothing changed.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add health/catalog_health.json health/catalog_health.md health/api-catalog.xlsx
          .github/scripts/api-commit.sh \
            "catalog-health: monthly link re-check $(date -u +%Y-%m-%d) [skip ci]"
