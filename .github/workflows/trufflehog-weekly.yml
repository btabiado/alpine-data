name: trufflehog-weekly

on:
  schedule:
    - cron: "0 3 * * 0"   # Sunday 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: trufflehog-weekly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Trufflehog scan
        id: scan
        # SHA-pinned for supply-chain safety. The action wrapper embeds the
        # scanner binary version, so this freezes both. Refresh quarterly.
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --only-verified --since-commit=HEAD~200
      - name: Summarize result
        if: always()
        run: |
          if [ "${{ steps.scan.outcome }}" = "success" ]; then
            echo "Trufflehog: no verified secrets found" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Trufflehog: verified secret(s) found - see scan step" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
