name: aviation-opensky

# Hourly refresh for the Aviation tab's live OpenSky snapshot.
# fetch_opensky.py writes data-opensky.json (stdlib-only: urllib/json).
#
# Cadence rationale:
#   The public Pages site at / only re-stages data-opensky.json when
#   pages.yml rebuilds (hourly cron). The client also reads
#   /data-opensky.json at runtime but falls back to the baked-in seed
#   (DATA.aviation.live.seed) if the fetch fails, so the effective
#   freshness is already bounded by the hourly deploy cycle. Refreshing
#   more often than hourly would produce wasted commits that pages.yml
#   never sees until its own next tick — so an hourly cadence is the
#   practical ceiling.
#
# Minute 25 offsets this run from pages.yml's top-of-hour build and the
# other daily data bots, avoiding simultaneous pushes to main.
# [skip ci] on the commit message keeps the push from retriggering
# pages.yml — its own hourly cron picks up the new data-opensky.json on
# the next tick.
on:
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# Solo concurrency group — keep manual dispatch from overlapping a run.
concurrency:
  group: aviation-opensky-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Fetch OpenSky snapshot
        # fetch_opensky.py uses only the Python standard library (urllib/json)
        # — no pip install step needed.
        # OPENSKY_CLIENT_ID and OPENSKY_CLIENT_SECRET are OPTIONAL: the fetcher
        # works anonymously when these secrets are unset (anonymous API, lower
        # rate limit). Set them to get authenticated access and a higher quota.
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: python fetch_opensky.py

      - name: Commit data changes via signed API commit
        # No AUTHOR_NAME / AUTHOR_EMAIL: omitting them is the exact condition
        # under which the GitHub Git Data API auto-signs the commit with
        # GitHub's key, producing the Verified badge. See api-commit.sh.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add data-opensky.json data-opensky-positions.json
          .github/scripts/api-commit.sh "aviation: refresh OpenSky snapshot $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
