name: lthcs-daily

# Daily LTHCS history accumulation. Runs lthcs_daily.py once per day,
# commits the resulting data/lthcs/ artifacts, and pushes back to main so
# pages.yml picks them up on its next hourly build. Distinct concurrency
# group from pages.yml so the two workflows don't block each other.
#
# Schedule rationale: 23:00 UTC = ~18:00 ET (after US market close, after
# Yahoo end-of-day prints have settled, before next-day pre-market churn).
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

# Push back to main requires contents:write. Pages deployment lives in
# pages.yml — we intentionally do NOT request pages:write here so the
# two workflows can't race over the gh-pages artifact.
permissions:
  contents: write

# Per-ref group so two pushes to main don't queue forever, but
# cancel-in-progress is false so a manually-triggered run in the middle
# of the cron run still queues (vs. being killed mid-write).
concurrency:
  group: lthcs-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the push back to main has a complete refspec.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LTHCS daily pipeline (with --catch-up to fill any gaps)
        env:
          # Optional API keys — every source degrades gracefully if its
          # secret is absent (empty string env -> source returns
          # {available: False} or falls back to a free alternative).
          # See README_LTHCS.md for the full degradation matrix.
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          # LLM shadow runs (Tier 5 #23 narratives + #28 sentiment).
          # Combined cost ~$0.50/day on Haiku 4.5 with prompt caching
          # (sentiment ~$0.19/day; narratives ~$0.31/day). Hard cap on
          # sentiment is $1.00/day (LTHCS_LLM_SENTIMENT_MAX_USD_PER_DAY).
          #
          # Gating: both flags default OFF in code. With them flipped to
          # "1" here, the stages run ONLY if ANTHROPIC_API_KEY is set as
          # a repo secret — when the secret is missing the env var
          # resolves to "" and the shadow code path no-ops gracefully
          # (no LLM calls, no errors, pipeline behavior identical to
          # pre-shadow). User must add ANTHROPIC_API_KEY at:
          #   Settings -> Secrets and variables -> Actions
          #
          # Shadow output (writes are append-only, never read by V1 UI):
          #   * data/lthcs/sentiment_llm/<date>.json   (Tier 5 #28)
          #   * data/lthcs/narratives_llm/<date>.json  (Tier 5 #23)
          #
          # Specs:
          #   * docs/lthcs-llm-sentiment-shadow-spec.md
          #   * LTHCS_NARRATIVES_LLM_ENABLED accepted as legacy synonym
          #     for LTHCS_LLM_NARRATIVES_ENABLED (one release only).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LTHCS_LLM_SENTIMENT_ENABLED: "1"
          LTHCS_LLM_NARRATIVES_ENABLED: "1"
        # --skip-thesis: do not burn the ~5-25/day Alpha Vantage quota in
        # CI; the rotation file is curated locally and Thesis falls back
        # to neutral 50 in CI runs (V1 daily pipeline behavior).
        # --catch-up: forward-fill any missed days since the last snapshot.
        # --force: re-running on a date that already has a snapshot is OK.
        run: python lthcs_daily.py --force --catch-up --skip-thesis

      - name: Commit data changes via signed API commit
        # Switched from plain `git push` to API-based commit so the
        # resulting commit is auto-signed by GitHub (Verified badge).
        # See .github/scripts/api-commit.sh for race-safety details
        # (re-reads remote tip + rebuilds tree on retry; same guarantee
        # the previous rebase-loop provided after run 26034240346).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR_NAME: lthcs-bot
          AUTHOR_EMAIL: lthcs-bot@users.noreply.github.com
        run: |
          git add data/lthcs/
          # [skip ci] prevents pages.yml from triggering its own rebuild
          # on every snapshot push (it catches up on the next hourly
          # cron anyway).
          .github/scripts/api-commit.sh \
            "lthcs: daily snapshot $(date -u +%Y-%m-%d) [skip ci]"
