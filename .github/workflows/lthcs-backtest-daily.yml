name: lthcs-backtest-daily

# Daily LTHCS engine backtest. Runs at 23:30 UTC — 30 min after
# lthcs-daily.yml (00:00 UTC schedule, drifts ±15min) is expected to
# land the day's snapshot. Produces non-overlapping P&L artifacts that
# replace the inflated overlapping-window Sharpe headline in the
# /lthcs/backtest/ UI:
#
#   equity_curve.csv / .json    daily portfolio equity (event-driven)
#   positions_daily.csv         daily portfolio composition
#   trades.csv                  entry/exit pairs with hold_days, returns
#   band_curves.json            per-band sub-portfolio curves (smell test)
#   benchmark_curve.json        SPY normalized
#   engine_summary.json         sharpe/sortino/max_dd/hit_rate/turnover
#   engine_report.md            human-readable markdown report
#
# Output lives under data/lthcs/backtest/<date>_validation/ alongside the
# weekly IC validator outputs so the existing UI fetch paths keep
# working. Commits back to main and lets pages.yml redeploy on the next
# hourly cycle.
#
# Gated on at least 30 snapshot files existing (mirrors the monthly
# workflow). With <30 snapshots the engine numbers are too noisy to be
# worth publishing.

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # Same group as the monthly so they can't race each other on the same
  # output directory if a monthly happens to overlap the daily window.
  group: lthcs-backtest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check snapshot history depth
        id: gate
        run: |
          set -e
          n=$(find data/lthcs/snapshots -maxdepth 1 -name '2*.json' -type f | wc -l | tr -d ' ')
          echo "snapshot_count=$n" >> "$GITHUB_OUTPUT"
          if [ "$n" -lt 30 ]; then
            echo "Only $n snapshots available (<30); skipping daily engine backtest."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute run id
        if: steps.gate.outputs.skip != 'true'
        id: window
        run: |
          # Use the most recent snapshot date as the run tag so the
          # output lands in the same dir as the weekly IC validator.
          latest=$(ls data/lthcs/snapshots/ | grep -E '^2[0-9]{3}-[0-9]{2}-[0-9]{2}\.json$' | sort | tail -1)
          tag="${latest%.json}_validation"
          echo "run_id=$tag" >> "$GITHUB_OUTPUT"

      - name: Run engine backtest
        if: steps.gate.outputs.skip != 'true'
        run: |
          # --engine pnl restricts to the non-overlapping engine path;
          # the weekly IC validator (lthcs-validate-weekly.yml) handles
          # the IC + quintile sections of the same run dir.
          # --benchmark SPY enables the SPY overlay on the equity chart.
          python scripts/lthcs_backtest.py \
            --engine pnl \
            --cost-bps 5.0 \
            --benchmark SPY \
            --run-id "${{ steps.window.outputs.run_id }}" \
            --output-dir "data/lthcs/backtest"

      - name: Commit data changes via signed API commit
        if: steps.gate.outputs.skip != 'true'
        # Switched from plain `git push` to API-based commit so the
        # resulting commit is auto-signed by GitHub (Verified badge).
        # See .github/scripts/api-commit.sh for race-safety details.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR_NAME: lthcs-bot
          AUTHOR_EMAIL: lthcs-bot@users.noreply.github.com
        run: |
          # Stage only the engine artifacts; the weekly IC outputs in
          # the same dir are owned by a different workflow.
          run_dir="data/lthcs/backtest/${{ steps.window.outputs.run_id }}"
          git add \
            "$run_dir/equity_curve.csv" "$run_dir/equity_curve.json" \
            "$run_dir/positions_daily.csv" "$run_dir/trades.csv" \
            "$run_dir/band_curves.json" "$run_dir/benchmark_curve.json" \
            "$run_dir/engine_summary.json" \
            "$run_dir/engine_report.md" 2>/dev/null || true
          .github/scripts/api-commit.sh \
            "lthcs: daily engine backtest ${{ steps.window.outputs.run_id }} [skip ci]"
