name: stock-money-flow-daily

# Daily refresh for the Stock Flows tab (Markets → Stock Flows). Scores the
# constituents of the Dow / Nasdaq-100 / S&P 500 (data/lthcs/universe.json, 219
# names) on money flow — MFI + Chaikin Money Flow from 6mo daily OHLCV — and
# writes data-stock-money-flow.json, which the V1 dashboard lazy-loads as a
# sidecar at runtime. This is a SEPARATE cron (not inline in the pages build) on
# purpose: it fans out ~219 Yahoo chart calls, which would be heavy/rate-limit-
# prone to run on every deploy. The committed sidecar is what gets deployed.
#
# fetch_stock_money_flow.py self-throttles (8 workers + 429/5xx exponential
# backoff; SMF_WORKERS env can dial concurrency down on a throttled runner).
#
# 09:00 UTC — offset from real-estate-daily (06:00), city-daily (07:00) and
# money-flow-daily (08:30) so the data-refresh bots don't race the same commit.
# [skip ci] keeps the push from retriggering pages.yml; its hourly cron picks up
# the fresh sidecar on the next tick.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-money-flow-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install deps
        # fetch_stock_money_flow.py is stdlib-only (urllib), but it imports
        # money_flow -> lthcs.normalize, which needs numpy.
        run: pip install numpy

      - name: Compute per-stock money flow
        # Writes data-stock-money-flow.json at repo root. Non-fatal: if Yahoo
        # rate-limits the whole run we keep the last-good sidecar rather than
        # break the workflow (the dashboard lazy-loads whatever is committed).
        run: python fetch_stock_money_flow.py || echo "[stock-money-flow] fetch failed; keeping last-good sidecar"

      - name: Commit sidecar via signed API commit
        # Mirrors city-daily.yml: API-based commit so the bot commit is
        # GitHub-signed (Verified). api-commit.sh retries on rebase conflict.
        # GUARD: only commit when the run actually scored stocks — Yahoo
        # throttles cold cron runners (scored 0), and committing an empty
        # sidecar would pollute history. The pages build is the primary
        # generator; this cron is a best-effort durable fallback.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR_NAME: stock-money-flow-bot
          AUTHOR_EMAIL: stock-money-flow-bot@users.noreply.github.com
        run: |
          scored=$(python3 -c "import json;print(json.load(open('data-stock-money-flow.json')).get('scored_count',0))" 2>/dev/null || echo 0)
          if [ "$scored" -gt 0 ]; then
            git add data-stock-money-flow.json
            .github/scripts/api-commit.sh \
              "stock-money-flow: daily refresh $(date -u +%Y-%m-%d) [skip ci]"
          else
            echo "[stock-money-flow] scored 0 (Yahoo throttled this runner) — skipping commit"
          fi
