name: pages

on:
  push:
    branches: [main]
  schedule:
    # Hourly live-data refresh. GitHub cron is best-effort and can drift
    # 5–15 min under fleet load. Frequent enough to feel fresh, conservative
    # on free-tier rate limits (CoinGecko 30/min, CryptoCompare keyless).
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore fetched data cache (markets_top stale-keep, etc.)
        # CI runs are stateless — every fetch starts cold. fetch_market.py's
        # stale-keep fallback (markets_top, lunarcrush) reads from prior
        # data/market.json, which doesn't exist on a fresh runner. This
        # cache lets the stale-keep actually work in CI by persisting the
        # most recent successful fetch between runs. Primary key uses
        # run_id so we always save a fresh snapshot; restore-keys prefix
        # gets the latest available on miss.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            data/market.json
            data/whale.json
          key: fetched-data-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            fetched-data-

      - name: Seed ETF flow CSV stubs (only if real CSVs not committed)
        run: |
          # If data/btc_flows.csv + data/eth_flows.csv are committed to the
          # repo (force-add overrides .gitignore), this step is a no-op.
          # Otherwise we seed one-row stubs to keep the ETF Flows tab from
          # crashing — useful before the user ships real Farside data.
          mkdir -p data
          if [ ! -f data/btc_flows.csv ]; then
            printf 'date,Total\n2024-01-11,100\n' > data/btc_flows.csv
          fi
          if [ ! -f data/eth_flows.csv ]; then
            printf 'date,Total\n2024-07-23,50\n' > data/eth_flows.csv
          fi

      - name: Fetch live data + generate dashboard.html
        # app.py runs fetch_market.fetch_all() then renders dashboard.html
        # in one invocation. fetch_all handles per-source failures internally
        # (logs "[skip] <url>" and continues); app.py wraps the call in
        # try/except so the generator always runs even on a total fetch
        # crash, falling back to whatever data is on disk.
        env:
          # Optional API keys. If a secret isn't set in the repo, the env
          # var resolves to an empty string and the source falls back to
          # {available: False} or a free alternative. Add them under
          # repo Settings → Secrets and variables → Actions → New repository
          # secret to light up the corresponding sections on the public mirror:
          #   FRED            macro overlay (DXY/SPX/Gold/10Y/M2)
          #   GLASSNODE       true BTC whale-cohort metrics (replaces bitinfocharts)
          #   CRYPTOCOMPARE   per-coin social + news sentiment + dev stats
          #   REDDIT_*        subreddit subscriber counts (cloud IPs are normally
          #                   blocked; OAuth bypasses that)
          #   COINMETRICS     ETH whale active addresses / tx count / transfer
          #                   volume / supply on the Whale-tab ETH panel
          #   ETHERSCAN       90-day ETH blocks-per-day chart on the Whale-tab
          #                   ETH panel (free tier — synthesized from
          #                   getblocknobytime since dailytx is Pro-only)
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          COINMETRICS_API_KEY: ${{ secrets.COINMETRICS_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python app.py --fetch-market --no-open

      - name: Fallback generate if dashboard.html missing
        # Safety net: if the previous step crashed before generating,
        # render once more from whatever data exists.
        if: hashFiles('dashboard.html') == ''
        run: python app.py --no-open

      - name: Build dashboard health status JSON
        # Scans data/ + data/.stale/ mtimes to emit data/health/status.json,
        # consumed by /health/ to show per-tab freshness. Pure-stdlib script,
        # no API calls — runs after fetch-market so mtimes reflect this run.
        # Failure must NOT break the deploy: production at `/` is the source
        # of truth; /health/ is observability-only.
        run: python scripts/build_health_status.py || echo "[health] generator failed; continuing"
        continue-on-error: true

      - name: Generate V2 dashboard (parallel build, reads same data/)
        # V2 is a UX-cleanup spin of the same payload — reuses the cached
        # market.json / whale.json / ETF CSVs already fetched above so no
        # extra API calls. Failure here must NOT fail the deploy: production
        # at `/` is the source of truth; V2 at `/v2/` is additive.
        #
        # Env mirrors the V1 fetch step so V2-side fetchers (fetch_cpi.py,
        # fetch_supplies.py for inventory ratio, fetch_metals.py for FRED
        # gold price, future EIA-keyed sources) see the same secrets V1 does.
        # Without this block fetch_cpi sees FRED_API_KEY="" and ships an
        # empty-state payload even when the repo secret is configured —
        # which was exactly the bug on 2026-05-25.
        if: hashFiles('v2/app.py') != ''
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          COINMETRICS_API_KEY: ${{ secrets.COINMETRICS_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python v2/app.py --no-open || echo "[v2] build failed; production deploy continues"
        continue-on-error: true

      - name: Validate V2 dashboard JS structure
        # Structural lint of the freshly-built v2/dashboard.html inline
        # <script>. Catches the class of bug that bricked V2 in prod on
        # 2026-05-24 (duplicate `const SIDECAR_FOR_TAB`, plus an `if
        # (state.tab ...)` block accidentally nested inside a `V2.empty({...})`
        # call literal from a take-both conflict resolution). Pure-stdlib
        # Python — no new deps. FAILS THE BUILD on regression: the whole
        # point is to block bad deploys before they ship to /v2/.
        if: hashFiles('v2/dashboard.html') != ''
        run: python tools/validate_v2_dashboard.py

      - name: Stage site directory
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          # Sidecar payloads (data-<key>.json) are lazy-loaded by the page on
          # tab-select to keep the initial HTML under ~3.5MB. They're written
          # to the repo root by app.py alongside dashboard.html; copy whatever
          # is there so a new SIDECAR_KEYS entry doesn't need a workflow edit.
          # Glob runs in nullglob so an empty match doesn't error.
          shopt -s nullglob
          for f in data-*.json; do
            cp "$f" "_site/$f"
          done
          # Stage the V2 build under /v2/ when present. Missing v2/dashboard.html
          # means the V2 step skipped or failed — production at `/` is unaffected.
          if [ -f v2/dashboard.html ]; then
            mkdir -p _site/v2
            cp v2/dashboard.html _site/v2/index.html
            for f in v2/data-*.json; do
              cp "$f" "_site/v2/$(basename "$f")"
            done
          fi
          # Stage the LTHCS standalone tab under /lthcs/ when present.
          # The page is committed under lthcs_tab/ and reads its data from
          # data/lthcs/ (also committed). CI doesn't run lthcs_daily.py —
          # snapshots are produced locally on Bryan's laptop and pushed.
          # Missing lthcs_tab/index.html means LTHCS hasn't shipped yet;
          # the rest of the site is unaffected.
          if [ -f lthcs_tab/index.html ]; then
            mkdir -p _site/lthcs
            cp -R lthcs_tab/* _site/lthcs/
            # JS fetches "../data/lthcs/..." from _site/lthcs/index.html,
            # which resolves to _site/data/lthcs/. Stage the committed JSON
            # snapshot tree there.
            if [ -d data/lthcs ]; then
              mkdir -p _site/data
              cp -R data/lthcs _site/data/
            fi
          fi
          # Stage the LTHCS table view under /lthcs/table/. The committed
          # page lives at lthcs_table/index.html and uses "../lthcs_tab/..."
          # and "../data/..." relative paths so the same source works under
          # the dev server (where the page lives at /lthcs_table/, sibling
          # to /lthcs_tab/ and /data/).
          #
          # In production the page lives one directory deeper, at
          # /lthcs/table/index.html, so we mirror "lthcs_tab" and "data"
          # one level above it inside _site/lthcs/. That way:
          #   /lthcs/table/index.html  →  ../lthcs_tab/...  =  /lthcs/lthcs_tab/...
          #   /lthcs/table/index.html  →  ../data/lthcs/... =  /lthcs/data/lthcs/...
          # both resolve to real files. The existing card-view stage at
          # /lthcs/ (without /table) is untouched.
          if [ -f lthcs_table/index.html ]; then
            mkdir -p _site/lthcs/table
            cp -R lthcs_table/* _site/lthcs/table/
            # Sibling lthcs_tab/ copy for the table page's relative
            # references. The card view at _site/lthcs/ is unaffected.
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            # Sibling data/lthcs copy so "../data/lthcs/..." resolves from
            # /lthcs/table/. The card-view's /lthcs/ stage already gets
            # /data/lthcs/ via the earlier branch.
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS V2 visual-only experiment under /lthcs/v2/.
          # Source lives at lthcs_tab_v2/ and reuses three things from the
          # classic /lthcs/ page via relative paths:
          #   ../lthcs_tab/lthcs-detail.js   (ticker detail modal)
          #   ../lthcs_tab/lthcs-detail.css
          #   ../lthcs_tab/lthcs-about.{js,css}
          # In production the V2 page lives at /lthcs/v2/index.html, so we
          # mirror lthcs_tab/ next to it as /lthcs/v2/../lthcs_tab/ →
          # /lthcs/lthcs_tab/ — which is already produced by the table-view
          # staging branch above, so the import resolves with no extra copy.
          # We still need a sibling /lthcs/v2/../data/ for "../data/lthcs/..."
          # data fetches — that's also produced by earlier branches. The only
          # work this branch does is drop the V2 page payload itself.
          # V1 (`/`), V2 (`/v2/`), and classic /lthcs/ are all untouched.
          if [ -f lthcs_tab_v2/index.html ]; then
            mkdir -p _site/lthcs/v2
            cp -R lthcs_tab_v2/* _site/lthcs/v2/
            # Defensive: re-mirror lthcs_tab/ and data/lthcs/ in case the
            # table-view branch above didn't run (e.g. lthcs_table/ deleted
            # but V2 still wanted). Idempotent — `cp -R` overwrites existing.
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS pipeline health observability page under
          # /lthcs/health/. Source lives at lthcs_health/ and reuses
          # ../lthcs_tab/lthcs.css for design tokens + reads its data via
          # "../data/lthcs/..." — both resolve cleanly once we mirror
          # lthcs_tab/ and data/lthcs/ one level above /lthcs/health/.
          # V1 (`/`), V2 (`/v2/`), classic /lthcs/, /lthcs/table/, and
          # /lthcs/v2/ are all untouched.
          if [ -f lthcs_health/index.html ]; then
            mkdir -p _site/lthcs/health
            cp -R lthcs_health/* _site/lthcs/health/
            # Same defensive mirroring as the V2/table branches above:
            # idempotent re-copies of lthcs_tab and data/lthcs so the
            # page works even if earlier branches didn't run.
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS backtest validation page under /lthcs/backtest/.
          # Source lives at lthcs_backtest/ and reuses ../lthcs_tab/lthcs.css
          # for design tokens + reads its data via "../data/lthcs/backtest/..."
          # and "../data/lthcs/adaptive_weights/...". Both resolve cleanly
          # once we mirror lthcs_tab/ and data/lthcs/ one level above
          # /lthcs/backtest/. V1 (`/`), V2 (`/v2/`), classic /lthcs/,
          # /lthcs/table/, /lthcs/v2/, and /lthcs/health/ are all untouched.
          if [ -f lthcs_backtest/index.html ]; then
            mkdir -p _site/lthcs/backtest
            cp -R lthcs_backtest/* _site/lthcs/backtest/
            # Defensive idempotent re-mirror of lthcs_tab and data/lthcs in
            # case earlier branches didn't run (e.g. lthcs_health/ deleted
            # but backtest still wanted). `cp -R` overwrites existing.
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS crypto extension page under /lthcs/crypto/.
          # Source lives at lthcs_crypto/ and reuses ../lthcs_tab/lthcs.css
          # for design tokens + reads its data via
          # "../data/lthcs/snapshots_crypto/<date>.json" and
          # "../data/lthcs/crypto_universe.json". Both resolve cleanly once
          # we mirror lthcs_tab/ and data/lthcs/ one level above
          # /lthcs/crypto/ (idempotent with the health/backtest re-copies
          # above). V1-only — does NOT stage under /v2/.
          if [ -f lthcs_crypto/index.html ]; then
            mkdir -p _site/lthcs/crypto
            cp -R lthcs_crypto/* _site/lthcs/crypto/
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS position-sizing helper under /lthcs/position/.
          # Source lives at lthcs_position/ and reuses ../lthcs_tab/lthcs.css
          # for design tokens + reads ../data/lthcs/snapshots/<date>.json
          # for composite scores. Both resolve once we mirror lthcs_tab/ and
          # data/lthcs/ one level above /lthcs/position/ (idempotent with the
          # health/backtest/crypto branches above). Paper-money calculator —
          # V1-only — does NOT stage under /v2/.
          if [ -f lthcs_position/index.html ]; then
            mkdir -p _site/lthcs/position
            cp -R lthcs_position/* _site/lthcs/position/
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS public read-only data index under /lthcs/public/.
          # Source lives at lthcs_public/ and reuses ../lthcs_tab/lthcs.css
          # for design tokens + reads ../data/lthcs/public/manifest.json
          # (built by scripts/lthcs_build_public_manifest.py as the final
          # daily-pipeline stage). Both resolve once we mirror lthcs_tab/ and
          # data/lthcs/ one level above /lthcs/public/ (idempotent with the
          # health/backtest/crypto/position branches above). Phase 4
          # follow-on — V1-only — does NOT stage under /v2/.
          if [ -f lthcs_public/index.html ]; then
            mkdir -p _site/lthcs/public
            cp -R lthcs_public/* _site/lthcs/public/
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS "how to read" help page under /lthcs/help/.
          # Source lives at lthcs_help/ and reuses ../lthcs_tab/lthcs.css
          # for design tokens. It has no data dependency — it's a pure
          # static explainer — but we still mirror lthcs_tab/ one level
          # above /lthcs/help/ so the ../lthcs_tab/lthcs.css reference
          # resolves (idempotent with the health/backtest/crypto/position/
          # public branches above). V1-only — does NOT stage under /v2/.
          if [ -f lthcs_help/index.html ]; then
            mkdir -p _site/lthcs/help
            cp -R lthcs_help/* _site/lthcs/help/
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
          fi
          # Stage the LTHCS snapshot-diff page under /lthcs/diff/. Source
          # at lthcs_diff/; reuses ../lthcs_tab/lthcs.css for tokens + reads
          # ../data/lthcs/snapshots/<date>.json for the per-day deltas.
          # Phase 5 BETA route.
          if [ -f lthcs_diff/index.html ]; then
            mkdir -p _site/lthcs/diff
            cp -R lthcs_diff/* _site/lthcs/diff/
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS history search page under /lthcs/history/. Source
          # at lthcs_history/; reuses ../lthcs_tab/lthcs.css for tokens +
          # reads ../data/lthcs/history/by_ticker/<TKR>.json client-side.
          # Phase 5 ZETA route.
          if [ -f lthcs_history/index.html ]; then
            mkdir -p _site/lthcs/history
            cp -R lthcs_history/* _site/lthcs/history/
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the LTHCS per-pillar leaderboards under /lthcs/leaderboards/.
          # Source at lthcs_leaderboards/; reuses ../lthcs_tab/lthcs.css + the
          # sparkline helper from ../lthcs_tab/lthcs-sparkline.js + reads
          # ../data/lthcs/public/latest_snapshot.json. Phase 5 EPSILON route.
          if [ -f lthcs_leaderboards/index.html ]; then
            mkdir -p _site/lthcs/leaderboards
            cp -R lthcs_leaderboards/* _site/lthcs/leaderboards/
            mkdir -p _site/lthcs/lthcs_tab
            cp -R lthcs_tab/* _site/lthcs/lthcs_tab/ 2>/dev/null || true
            if [ -d data/lthcs ]; then
              mkdir -p _site/lthcs/data
              cp -R data/lthcs _site/lthcs/data/
            fi
          fi
          # Stage the US Real Estate Markets page under /real-estate/. Source
          # at real_estate/index.html (self-contained — inline CSS/JS, Chart.js
          # via CDN with SRI). Reads data from /data/real_estate.json built by
          # the daily real-estate-daily.yml workflow and committed back to the
          # repo. V1 (`/`), V2 (`/v2/`), /health/, and all /lthcs/* paths are
          # untouched. Missing real_estate/index.html or the data JSON makes
          # this branch a no-op; the rest of the site is unaffected.
          if [ -f real_estate/index.html ]; then
            mkdir -p _site/real-estate
            cp -R real_estate/* _site/real-estate/
            if [ -f data/real_estate.json ]; then
              mkdir -p _site/data
              cp data/real_estate.json _site/data/real_estate.json
            fi
            # Heat-map needs metro centroid coords (Census CBSA gazetteer).
            # Static reference data — refreshed manually when Census publishes
            # a new annual gazetteer.
            if [ -f data/metro_coords.json ]; then
              mkdir -p _site/data
              cp data/metro_coords.json _site/data/metro_coords.json
            fi
          fi
          # Stage the central dashboard health observability page under /health/.
          # Source lives at health/index.html (self-contained — no external CSS
          # or JS) and reads its data from /data/health/status.json. Both are
          # produced by the "Build dashboard health status JSON" step above.
          # V1 (`/`), V2 (`/v2/`), and all /lthcs/* paths are untouched —
          # /health/ is a sibling route. Missing health/index.html or the
          # status JSON makes this branch a no-op; the rest of the site is
          # unaffected.
          if [ -f health/index.html ]; then
            mkdir -p _site/health
            cp -R health/* _site/health/
            if [ -f data/health/status.json ]; then
              mkdir -p _site/data/health
              cp data/health/status.json _site/data/health/status.json
            fi
          fi
          # Include a tiny "about" so the page works even if dashboard.html breaks
          cat > _site/README.txt <<EOF
          BTC/ETH/LINK Trading Dashboard — static snapshot
          Source: https://github.com/btabiado/btc-eth-etf-dashboard
          Generated: $(date -u)
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
