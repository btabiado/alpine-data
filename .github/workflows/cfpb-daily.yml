name: cfpb-daily

# Daily refresh for the CFPB Consumer Complaint feed (data-cfpb.json), consumed by
# ADW-397 (Student-Loan Servicer Complaint Velocity). The CFPB API blocks
# Cloudflare datacenter IPs, so the ADW Worker cannot fetch it directly — GitHub
# Actions runners have clean egress, so we fetch here and publish the raw counts as
# a keyless JSON feed. The Worker reads it via fetchAlpineFeed('cfpb') and scores it.
#
# Commit carries [skip ci] so the push doesn't retrigger pages.yml's push build;
# pages.yml's own hourly cron picks up the new data-*.json on its next tick.
on:
  schedule:
    # 07:00 UTC = 02:00 ET — CFPB updates complaints on a rolling daily basis.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cfpb-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Fetch CFPB complaint counts
        # Pure-stdlib fetcher — no pip install. Non-zero exit fails the workflow
        # on purpose so a dead fetcher is visible in the Actions UI.
        run: python scripts/fetch_cfpb.py

      - name: Commit data changes via signed API commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR_NAME: cfpb-bot
          AUTHOR_EMAIL: cfpb-bot@users.noreply.github.com
        run: |
          git add data-cfpb.json
          .github/scripts/api-commit.sh \
            "cfpb: daily refresh $(date -u +%Y-%m-%d) [skip ci]"
